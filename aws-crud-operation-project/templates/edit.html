<!DOCTYPE html>
<html>
<head>
    <title>Edit Employee</title>
</head>
<body>
    <h1>Edit Employee</h1>

    <form method="POST">
        <input type="text" name="name" value="{{ employee[1] }}" required>
        <br><br>

        <input type="email" name="email" value="{{ employee[2] }}" required>
        <br><br>

        <input type="text" name="role" value="{{ employee[3] }}" required>
        <br><br>

        <button type="submit">Update Employee</button>
    </form>
</body>
</html>
